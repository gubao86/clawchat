name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build APK (debug)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: flutter build apk --debug --split-per-abi

      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Build APK (release, signed)
        if: startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64 != ''
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=FLUTTER_BUILD_MODE=release \
            -- \
            -Pandroid.injected.signing.store.file=$PWD/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build APK (release, unsigned)
        if: startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64 == ''
        run: flutter build apk --release --split-per-abi

      - name: Upload debug APKs as artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: clawchat-debug-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Upload release APKs as artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: clawchat-release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ClawChat ${{ github.ref_name }}
          body: |
            ## ClawChat ${{ github.ref_name }}

            ### 安装说明
            根据你的设备 CPU 架构选择对应 APK：
            - `arm64-v8a` — 现代 64 位 Android 设备（推荐）
            - `armeabi-v7a` — 旧款 32 位 ARM 设备
            - `x86_64` — Android 模拟器 / x86 设备

            ### 安装步骤
            1. 下载对应架构的 APK
            2. 在 Android 设置中允许安装未知来源应用
            3. 打开 APK 文件安装
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
