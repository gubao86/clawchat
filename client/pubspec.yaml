name: clawchat
description: OpenClaw AI 专用客户端
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  # 文件选择
  file_picker: ^8.0.0
  # 图片/相机选择
  image_picker: ^1.1.2
  # 语音录制
  record: ^5.1.2
  # 文件路径（record 依赖）
  path_provider: ^2.1.4
  # 运行时权限申请
  permission_handler: ^11.3.1
  # 网络图片缓存
  cached_network_image: ^3.3.1
  # AI 回复 Markdown 渲染
  flutter_markdown: ^0.7.3
  # 视频播放
  video_player: ^2.8.7
  # 音频播放
  just_audio: ^0.9.38
  # MIME 类型检测
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
